coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 70%
        threshold: 5%
        if_not_found: success
        if_ci_failed: error
    patch:
      default:
        target: 60%
        threshold: 10%
        if_not_found: success

  flags:
    mobile:
      paths:
        - apps/mobile/src/
      carryforward: true
    shared:
      paths:
        - packages/shared/src/
      carryforward: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: no
  require_head: yes

ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/__tests__/**"
  - "**/__mocks__/**"
  - "apps/mobile/src/i18n/**"
  - "infra/**"
  - "docs/**"
  - "scripts/**"
