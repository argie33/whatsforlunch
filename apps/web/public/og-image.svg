<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FBFAF7"/>

  <!-- Green accent blob -->
  <ellipse cx="950" cy="315" rx="380" ry="340" fill="#E8F4EF" opacity="0.8"/>
  <ellipse cx="200" cy="100" rx="200" ry="180" fill="#E8F4EF" opacity="0.5"/>

  <!-- Left: Logo + wordmark + tagline -->
  <!-- Logo mark -->
  <rect x="80" y="180" width="80" height="80" rx="20" fill="#2F7D5B"/>
  <!-- Fridge body -->
  <rect x="93" y="189" width="54" height="62" rx="9" fill="white" fill-opacity="0.92"/>
  <!-- Fridge top section -->
  <rect x="93" y="189" width="54" height="32" rx="9" fill="white"/>
  <!-- Divider -->
  <rect x="93" y="220" width="54" height="2.5" fill="white" fill-opacity="0.35"/>
  <!-- Colored dots -->
  <circle cx="112" cy="206" r="5.5" fill="#E85C38"/>
  <circle cx="128" cy="206" r="5.5" fill="#E8A838"/>
  <circle cx="112" cy="237" r="5.5" fill="#2F7D5B"/>
  <circle cx="128" cy="237" r="5.5" fill="#E8F4EF"/>

  <!-- Brand name -->
  <text x="178" y="236" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="800" fill="#1A1F1C" letter-spacing="-1">WhatsForLunch</text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#1A1F1C" letter-spacing="-2">Stop wasting food.</text>

  <!-- Body copy -->
  <text x="80" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" fill="#5C615E">Track your fridge. Get reminded. Cook smart.</text>

  <!-- Download badges -->
  <rect x="80" y="420" width="180" height="60" rx="14" fill="#1A1F1C"/>
  <text x="120" y="445" font-family="-apple-system, sans-serif" font-size="11" fill="white" fill-opacity="0.7">Download on the</text>
  <text x="120" y="463" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="white">App Store</text>

  <rect x="278" y="420" width="180" height="60" rx="14" fill="white" stroke="#DDD" stroke-width="1.5"/>
  <text x="318" y="445" font-family="-apple-system, sans-serif" font-size="11" fill="#666">Get it on</text>
  <text x="318" y="463" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#1A1F1C">Google Play</text>

  <!-- Right: Mock phone -->
  <g transform="translate(750, 60)">
    <!-- Phone shell -->
    <rect x="0" y="0" width="260" height="510" rx="36" fill="#1A1F1C"/>
    <!-- Screen area -->
    <rect x="10" y="10" width="240" height="490" rx="28" fill="#FBFAF7"/>
    <!-- Dynamic island sim -->
    <rect x="100" y="20" width="60" height="16" rx="8" fill="#1A1F1C"/>

    <!-- App content mock -->
    <!-- Header -->
    <text x="24" y="62" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#8A8E8C" letter-spacing="1">YOUR KITCHEN</text>
    <text x="24" y="82" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#1A1F1C">Today</text>

    <!-- Search bar mock -->
    <rect x="20" y="92" width="220" height="28" rx="8" fill="#EDEEEC"/>
    <text x="40" y="111" font-family="-apple-system, sans-serif" font-size="11" fill="#8A8E8C">Search kitchen…</text>

    <!-- Section label -->
    <text x="24" y="140" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#E85C38" letter-spacing="1">EAT TODAY</text>

    <!-- Item cards -->
    <!-- Card 1 -->
    <rect x="20" y="148" width="220" height="44" rx="12" fill="white"/>
    <rect x="20" y="148" width="4" height="44" rx="2" fill="#E85C38"/>
    <text x="36" y="167" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1A1F1C">Cooked chicken</text>
    <text x="36" y="182" font-family="-apple-system, sans-serif" font-size="10" fill="#E85C38">Eat today</text>
    <text x="204" y="175" font-family="-apple-system, sans-serif" font-size="18">🍗</text>

    <!-- Card 2 -->
    <rect x="20" y="198" width="220" height="44" rx="12" fill="white"/>
    <rect x="20" y="198" width="4" height="44" rx="2" fill="#E85C38"/>
    <text x="36" y="217" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1A1F1C">Greek yogurt</text>
    <text x="36" y="232" font-family="-apple-system, sans-serif" font-size="10" fill="#E85C38">Eat today</text>
    <text x="204" y="225" font-family="-apple-system, sans-serif" font-size="18">🥛</text>

    <!-- Section label 2 -->
    <text x="24" y="264" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#E8A838" letter-spacing="1">USE SOON</text>

    <!-- Card 3 -->
    <rect x="20" y="272" width="220" height="44" rx="12" fill="white"/>
    <rect x="20" y="272" width="4" height="44" rx="2" fill="#E8A838"/>
    <text x="36" y="291" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1A1F1C">Baby spinach</text>
    <text x="36" y="306" font-family="-apple-system, sans-serif" font-size="10" fill="#8A8E8C">2 days left</text>
    <text x="204" y="299" font-family="-apple-system, sans-serif" font-size="18">🥬</text>

    <!-- Card 4 -->
    <rect x="20" y="322" width="220" height="44" rx="12" fill="white"/>
    <rect x="20" y="322" width="4" height="44" rx="2" fill="#E8A838"/>
    <text x="36" y="341" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1A1F1C">Cheddar cheese</text>
    <text x="36" y="356" font-family="-apple-system, sans-serif" font-size="10" fill="#8A8E8C">3 days left</text>
    <text x="204" y="349" font-family="-apple-system, sans-serif" font-size="18">🧀</text>

    <!-- Section label 3 -->
    <text x="24" y="390" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#2F7D5B" letter-spacing="1">FRESH</text>

    <!-- Card 5 -->
    <rect x="20" y="398" width="220" height="44" rx="12" fill="white"/>
    <rect x="20" y="398" width="4" height="44" rx="2" fill="#2F7D5B"/>
    <text x="36" y="417" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1A1F1C">Cherry tomatoes</text>
    <text x="36" y="432" font-family="-apple-system, sans-serif" font-size="10" fill="#8A8E8C">5 days left</text>
    <text x="204" y="425" font-family="-apple-system, sans-serif" font-size="18">🍅</text>

    <!-- Tab bar -->
    <rect x="10" y="458" width="240" height="42" rx="0" fill="white"/>
    <rect x="10" y="458" width="240" height="1" fill="#EDEEEC"/>
    <text x="35" y="484" font-family="-apple-system, sans-serif" font-size="20" text-anchor="middle">🏠</text>
    <text x="95" y="484" font-family="-apple-system, sans-serif" font-size="20" text-anchor="middle" opacity="0.3">📷</text>
    <text x="165" y="484" font-family="-apple-system, sans-serif" font-size="20" text-anchor="middle" opacity="0.3">📦</text>
    <text x="225" y="484" font-family="-apple-system, sans-serif" font-size="20" text-anchor="middle" opacity="0.3">⚙️</text>
  </g>

  <!-- URL -->
  <text x="80" y="590" font-family="-apple-system, sans-serif" font-size="20" fill="#8A8E8C">whatsforlunch.app</text>
</svg>
