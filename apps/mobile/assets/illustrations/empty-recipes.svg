<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <circle cx="140" cy="140" r="110" fill="#FAF1E1" opacity="0.5"/>

  <!-- Open cookbook -->
  <!-- Spine -->
  <rect x="136" y="72" width="8" height="152" rx="4" fill="#D2CFC7"/>

  <!-- Left page -->
  <rect x="56" y="72" width="84" height="152" rx="12" fill="#FFFFFF" stroke="#D2CFC7" stroke-width="1.5"/>
  <!-- Left page fold at spine -->
  <path d="M136 72 Q130 80 130 148 Q130 216 136 224" stroke="#E8E5DE" stroke-width="1" fill="none"/>

  <!-- Right page -->
  <rect x="140" y="72" width="84" height="152" rx="12" fill="#FFFFFF" stroke="#D2CFC7" stroke-width="1.5"/>

  <!-- Left page content: ingredients list -->
  <rect x="68" y="90" width="48" height="6" rx="3" fill="#0F1411" opacity="0.7"/>
  <rect x="68" y="102" width="12" height="4" rx="2" fill="#2F7D5B" opacity="0.8"/>
  <rect x="84" y="102" width="40" height="4" rx="2" fill="#8B908D" opacity="0.6"/>
  <rect x="68" y="110" width="12" height="4" rx="2" fill="#2F7D5B" opacity="0.8"/>
  <rect x="84" y="110" width="32" height="4" rx="2" fill="#8B908D" opacity="0.6"/>
  <rect x="68" y="118" width="12" height="4" rx="2" fill="#2F7D5B" opacity="0.8"/>
  <rect x="84" y="118" width="38" height="4" rx="2" fill="#8B908D" opacity="0.6"/>
  <rect x="68" y="126" width="12" height="4" rx="2" fill="#2F7D5B" opacity="0.8"/>
  <rect x="84" y="126" width="36" height="4" rx="2" fill="#8B908D" opacity="0.6"/>

  <!-- Decorative food doodle bottom left -->
  <!-- Carrot -->
  <path d="M72 178 Q76 168 80 178" stroke="#C98A2B" stroke-width="2" fill="#FAF1E1" stroke-linecap="round"/>
  <path d="M74 168 Q76 162 78 168" stroke="#2F7D5B" stroke-width="1.5" fill="#E8F2EC" stroke-linecap="round"/>
  <!-- Leaf sprigs -->
  <path d="M76 162 Q72 156 74 160" stroke="#2F7D5B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M76 162 Q80 156 78 160" stroke="#2F7D5B" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Right page: big question mark (nothing to suggest) -->
  <text x="182" y="160" font-size="64" text-anchor="middle" dominant-baseline="middle" fill="#E8F2EC" font-family="Georgia, serif" font-weight="700">?</text>
  <text x="182" y="160" font-size="56" text-anchor="middle" dominant-baseline="middle" fill="#C98A2B" opacity="0.35" font-family="Georgia, serif" font-weight="700">?</text>

  <!-- Stars / sparkles around question mark -->
  <g stroke="#C98A2B" stroke-width="1.5" stroke-linecap="round">
    <line x1="155" y1="108" x2="155" y2="114"/>
    <line x1="152" y1="111" x2="158" y2="111"/>
    <line x1="205" y1="140" x2="205" y2="146"/>
    <line x1="202" y1="143" x2="208" y2="143"/>
    <line x1="160" y1="180" x2="160" y2="184"/>
    <line x1="158" y1="182" x2="162" y2="182"/>
  </g>

  <!-- Page numbers -->
  <text x="96" y="214" font-size="9" text-anchor="middle" fill="#8B908D" font-family="Georgia, serif">24</text>
  <text x="184" y="214" font-size="9" text-anchor="middle" fill="#8B908D" font-family="Georgia, serif">25</text>
</svg>
