<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <!-- Warm background -->
  <circle cx="140" cy="140" r="110" fill="#E8F2EC" opacity="0.5"/>

  <!-- Phone -->
  <rect x="95" y="60" width="90" height="160" rx="20" fill="#0F1411"/>
  <rect x="99" y="64" width="82" height="152" rx="17" fill="#FBFAF7"/>

  <!-- App screen showing dashboard -->
  <rect x="105" y="80" width="70" height="110" rx="6" fill="#FBFAF7"/>

  <!-- Dashboard header -->
  <rect x="105" y="80" width="70" height="20" rx="6" fill="#2F7D5B"/>
  <rect x="110" y="86" width="30" height="4" rx="2" fill="#FFFFFF" opacity="0.9"/>
  <rect x="110" y="93" width="20" height="3" rx="1.5" fill="#FFFFFF" opacity="0.6"/>

  <!-- Item rows with status stripes -->
  <rect x="105" y="104" width="70" height="20" rx="0" fill="#FFFFFF"/>
  <rect x="105" y="104" width="3" height="20" fill="#C24A3E"/>
  <rect x="112" y="108" width="28" height="4" rx="2" fill="#0F1411" opacity="0.7"/>
  <rect x="112" y="115" width="20" height="3" rx="1.5" fill="#C24A3E" opacity="0.7"/>

  <rect x="105" y="126" width="70" height="20" rx="0" fill="#FFFFFF"/>
  <rect x="105" y="126" width="3" height="20" fill="#C98A2B"/>
  <rect x="112" y="130" width="24" height="4" rx="2" fill="#0F1411" opacity="0.7"/>
  <rect x="112" y="137" width="18" height="3" rx="1.5" fill="#C98A2B" opacity="0.7"/>

  <rect x="105" y="148" width="70" height="20" rx="0" fill="#FFFFFF"/>
  <rect x="105" y="148" width="3" height="20" fill="#3A8C5F"/>
  <rect x="112" y="152" width="26" height="4" rx="2" fill="#0F1411" opacity="0.7"/>
  <rect x="112" y="159" width="16" height="3" rx="1.5" fill="#3A8C5F" opacity="0.7"/>

  <!-- Bottom border of screen -->
  <rect x="105" y="168" width="70" height="22" rx="0" fill="#F2F0EB"/>
  <rect x="112" y="173" width="44" height="3" rx="1.5" fill="#D2CFC7"/>
  <rect x="112" y="180" width="36" height="3" rx="1.5" fill="#D2CFC7"/>

  <!-- Notification popup flying out -->
  <rect x="28" y="92" width="120" height="56" rx="14" fill="#FFFFFF" stroke="#E8E5DE" stroke-width="1.5"/>
  <!-- Shadow illusion -->
  <rect x="30" y="96" width="120" height="56" rx="14" fill="#0F1411" opacity="0.05"/>

  <!-- Notification content -->
  <!-- App icon small -->
  <rect x="40" y="102" width="18" height="18" rx="5" fill="#2F7D5B"/>
  <circle cx="49" cy="111" r="5" fill="#FFFFFF" opacity="0.9"/>

  <rect x="64" y="102" width="70" height="5" rx="2.5" fill="#0F1411" opacity="0.8"/>
  <rect x="64" y="110" width="80" height="4" rx="2" fill="#5C615E" opacity="0.7"/>
  <rect x="64" y="117" width="65" height="4" rx="2" fill="#5C615E" opacity="0.5"/>

  <!-- Notification action buttons -->
  <rect x="40" y="128" width="40" height="12" rx="6" fill="#E8F2EC"/>
  <rect x="86" y="128" width="44" height="12" rx="6" fill="#FAF1E1"/>

  <!-- Curved arrow from phone to notification -->
  <path d="M105 120 Q80 110 148 118" stroke="#2F7D5B" stroke-width="1.5" fill="none" stroke-dasharray="4 3" stroke-linecap="round"/>
  <polygon points="146,114 152,118 146,122" fill="#2F7D5B"/>
</svg>
