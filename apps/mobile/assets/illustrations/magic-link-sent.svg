<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <circle cx="140" cy="140" r="110" fill="#E8F2EC" opacity="0.5"/>

  <!-- Envelope body -->
  <rect x="60" y="96" width="160" height="108" rx="12" fill="#FFFFFF" stroke="#2F7D5B" stroke-width="2.5"/>

  <!-- Envelope flap (open/sent) -->
  <path d="M60 96 L140 158 L220 96" stroke="#2F7D5B" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- Envelope bottom fold lines -->
  <line x1="60" y1="204" x2="104" y2="160" stroke="#E8E5DE" stroke-width="1.5"/>
  <line x1="220" y1="204" x2="176" y2="160" stroke="#E8E5DE" stroke-width="1.5"/>

  <!-- Flying sparkles top right -->
  <!-- Large star -->
  <g transform="translate(196, 72)" fill="#C98A2B">
    <polygon points="0,-10 2.5,-3.5 9,-3.5 4,1 6,8 0,3.5 -6,8 -4,1 -9,-3.5 -2.5,-3.5"/>
  </g>

  <!-- Medium star -->
  <g transform="translate(220, 88)" fill="#2F7D5B">
    <polygon points="0,-7 1.8,-2.5 6.5,-2.5 2.8,0.8 4.3,5.7 0,2.5 -4.3,5.7 -2.8,0.8 -6.5,-2.5 -1.8,-2.5"/>
  </g>

  <!-- Small star -->
  <g transform="translate(208, 58)" fill="#E56C5A">
    <polygon points="0,-5 1.3,-1.8 4.7,-1.8 2,0.6 3.1,4.1 0,1.8 -3.1,4.1 -2,0.6 -4.7,-1.8 -1.3,-1.8"/>
  </g>

  <!-- Sparkle lines -->
  <g stroke="#C98A2B" stroke-width="1.5" stroke-linecap="round">
    <line x1="234" y1="72" x2="238" y2="68"/>
    <line x1="234" y1="68" x2="238" y2="72"/>
    <line x1="236" y1="66" x2="236" y2="74"/>
    <line x1="232" y1="70" x2="240" y2="70"/>
  </g>

  <!-- Check circle inside envelope -->
  <circle cx="140" cy="155" r="24" fill="#E8F2EC" stroke="#2F7D5B" stroke-width="2"/>
  <circle cx="140" cy="155" r="18" fill="#2F7D5B"/>
  <polyline points="131,155 138,162 150,148" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Motion lines (envelope just sent) -->
  <g stroke="#E8E5DE" stroke-width="1.5" stroke-linecap="round">
    <line x1="44" y1="120" x2="56" y2="120"/>
    <line x1="40" y1="134" x2="54" y2="134"/>
    <line x1="44" y1="148" x2="56" y2="148"/>
  </g>
</svg>
