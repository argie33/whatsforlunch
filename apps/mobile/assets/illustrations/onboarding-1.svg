<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <!-- Warm background -->
  <circle cx="140" cy="130" r="110" fill="#E8F2EC" opacity="0.6"/>

  <!-- Fridge body (full, organized) -->
  <rect x="68" y="32" width="144" height="196" rx="16" fill="#FFFFFF" stroke="#2F7D5B" stroke-width="2.5"/>
  <line x1="68" y1="112" x2="212" y2="112" stroke="#2F7D5B" stroke-width="2"/>

  <!-- Freezer compartment -->
  <rect x="78" y="42" width="124" height="60" rx="8" fill="#E8F2EC"/>
  <!-- Frozen items -->
  <rect x="88" y="52" width="36" height="40" rx="6" fill="#FFFFFF" stroke="#2F7D5B" stroke-width="1.5"/>
  <text x="106" y="76" font-size="20" text-anchor="middle" dominant-baseline="middle">🧊</text>
  <rect x="132" y="52" width="36" height="40" rx="6" fill="#FFFFFF" stroke="#2F7D5B" stroke-width="1.5"/>
  <text x="150" y="76" font-size="18" text-anchor="middle" dominant-baseline="middle">🥩</text>
  <rect x="176" y="52" width="24" height="40" rx="6" fill="#FFFFFF" stroke="#2F7D5B" stroke-width="1.5"/>

  <!-- Fridge interior — packed with items -->
  <rect x="78" y="120" width="124" height="98" rx="8" fill="#FBFAF7"/>

  <!-- Shelf 1 items -->
  <rect x="86" y="128" width="44" height="28" rx="5" fill="#E8F2EC" stroke="#2F7D5B" stroke-width="1.5"/>
  <rect x="136" y="128" width="32" height="28" rx="5" fill="#FAF1E1" stroke="#C98A2B" stroke-width="1.5"/>
  <rect x="174" y="128" width="20" height="28" rx="5" fill="#FAE8E5" stroke="#C24A3E" stroke-width="1.5"/>
  <!-- expiry badges on urgent item -->
  <rect x="166" y="122" width="34" height="12" rx="6" fill="#C24A3E"/>
  <line x1="174" y1="128" x2="174" y2="120" stroke="#C24A3E" stroke-width="1.5"/>

  <!-- Shelf divider -->
  <line x1="84" y1="162" x2="196" y2="162" stroke="#E8E5DE" stroke-width="1.5"/>

  <!-- Shelf 2 items -->
  <path d="M90 172 Q90 168 98 168 Q106 168 106 172 L108 190 Q108 194 99 194 Q90 194 88 190Z" fill="#E8F2EC" stroke="#2F7D5B" stroke-width="1.5"/>
  <rect x="116" y="168" width="50" height="24" rx="5" fill="#FBFAF7" stroke="#D2CFC7" stroke-width="1.5"/>
  <rect x="172" y="168" width="20" height="24" rx="5" fill="#E8F2EC" stroke="#2F7D5B" stroke-width="1.5"/>

  <!-- Door handle -->
  <rect x="142" y="122" width="8" height="36" rx="4" fill="#D2CFC7"/>
  <rect x="142" y="48" width="8" height="22" rx="4" fill="#D2CFC7"/>

  <!-- Status stripe on the right (brand signature) -->
  <rect x="212" y="128" width="4" height="28" rx="2" fill="#C24A3E"/>
  <rect x="212" y="162" width="4" height="24" rx="2" fill="#C98A2B"/>
  <rect x="212" y="192" width="4" height="16" rx="2" fill="#3A8C5F"/>

  <!-- Fridge feet -->
  <rect x="88" y="226" width="18" height="8" rx="4" fill="#D2CFC7"/>
  <rect x="174" y="226" width="18" height="8" rx="4" fill="#D2CFC7"/>
</svg>
