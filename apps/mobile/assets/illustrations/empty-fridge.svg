<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <!-- Background warm circle -->
  <circle cx="140" cy="140" r="120" fill="#E8F2EC" opacity="0.5"/>

  <!-- Fridge body -->
  <rect x="72" y="44" width="136" height="192" rx="16" fill="#FFFFFF" stroke="#2F7D5B" stroke-width="2.5"/>

  <!-- Fridge door divider -->
  <line x1="72" y1="118" x2="208" y2="118" stroke="#2F7D5B" stroke-width="2"/>

  <!-- Top compartment (freezer) label area -->
  <rect x="82" y="54" width="116" height="54" rx="8" fill="#E8F2EC"/>

  <!-- Freezer snowflake icon -->
  <g transform="translate(130,72)" stroke="#2F7D5B" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-12" x2="0" y2="12"/>
    <line x1="-12" y1="0" x2="12" y2="0"/>
    <line x1="-8.5" y1="-8.5" x2="8.5" y2="8.5"/>
    <line x1="8.5" y1="-8.5" x2="-8.5" y2="8.5"/>
    <!-- tick marks -->
    <line x1="-4" y1="-10" x2="0" y2="-12"/>
    <line x1="4" y1="-10" x2="0" y2="-12"/>
    <line x1="-4" y1="10" x2="0" y2="12"/>
    <line x1="4" y1="10" x2="0" y2="12"/>
  </g>

  <!-- Fridge compartment interior (mostly empty) -->
  <rect x="82" y="126" width="116" height="100" rx="8" fill="#FBFAF7"/>

  <!-- Single lonely item: small container left side -->
  <rect x="90" y="180" width="38" height="36" rx="6" fill="#E8F2EC" stroke="#2F7D5B" stroke-width="1.5"/>
  <line x1="90" y1="190" x2="128" y2="190" stroke="#2F7D5B" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- container handle -->
  <path d="M100 180 Q109 174 118 180" stroke="#2F7D5B" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Single apple right side (sad and alone) -->
  <path d="M162 192 Q162 176 174 176 Q186 176 186 192 Q186 206 174 208 Q162 206 162 192Z" fill="#FAF1E1" stroke="#C98A2B" stroke-width="1.5"/>
  <path d="M174 176 Q175 170 180 168" stroke="#2F7D5B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- leaf -->
  <path d="M180 168 Q184 164 183 170" stroke="#2F7D5B" stroke-width="1.5" fill="#E8F2EC" stroke-linecap="round"/>

  <!-- Fridge door handle -->
  <rect x="138" y="130" width="8" height="40" rx="4" fill="#D2CFC7"/>

  <!-- Fridge top handle freezer -->
  <rect x="138" y="60" width="8" height="24" rx="4" fill="#D2CFC7"/>

  <!-- Fridge feet -->
  <rect x="90" y="232" width="16" height="8" rx="4" fill="#D2CFC7"/>
  <rect x="174" y="232" width="16" height="8" rx="4" fill="#D2CFC7"/>

  <!-- Empty shelf lines -->
  <line x1="88" y1="160" x2="192" y2="160" stroke="#E8E5DE" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
