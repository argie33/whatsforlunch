<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <circle cx="140" cy="140" r="110" fill="#E8F2EC" opacity="0.5"/>

  <!-- Chart axes -->
  <line x1="72" y1="200" x2="208" y2="200" stroke="#D2CFC7" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="200" x2="72" y2="80" stroke="#D2CFC7" stroke-width="2" stroke-linecap="round"/>

  <!-- Bar chart bars — all empty/ghost (dashed outlines) -->
  <rect x="88" y="148" width="28" height="52" rx="6" fill="none" stroke="#D2CFC7" stroke-width="2" stroke-dasharray="5 3"/>
  <rect x="124" y="120" width="28" height="80" rx="6" fill="none" stroke="#D2CFC7" stroke-width="2" stroke-dasharray="5 3"/>
  <rect x="160" y="160" width="28" height="40" rx="6" fill="none" stroke="#D2CFC7" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Question marks inside bars -->
  <text x="102" y="180" font-size="14" text-anchor="middle" fill="#D2CFC7" font-family="Georgia, serif" font-weight="600">?</text>
  <text x="138" y="166" font-size="14" text-anchor="middle" fill="#D2CFC7" font-family="Georgia, serif" font-weight="600">?</text>
  <text x="174" y="187" font-size="14" text-anchor="middle" fill="#D2CFC7" font-family="Georgia, serif" font-weight="600">?</text>

  <!-- Sprout / seedling growing from x-axis -->
  <!-- Stem -->
  <path d="M140 200 Q140 175 140 155" stroke="#2F7D5B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Left leaf -->
  <path d="M140 178 Q124 170 126 158 Q138 162 140 178" fill="#E8F2EC" stroke="#2F7D5B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right leaf -->
  <path d="M140 170 Q156 162 154 150 Q142 154 140 170" fill="#E8F2EC" stroke="#2F7D5B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tiny bud at top -->
  <circle cx="140" cy="152" r="5" fill="#3A8C5F"/>
  <path d="M138 152 Q140 145 142 152" fill="#E8F2EC" stroke="#2F7D5B" stroke-width="1" fill="none"/>

  <!-- Star / sparkle top right (potential) -->
  <g transform="translate(190, 108)" fill="#C98A2B" opacity="0.6">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,7 0,3 -5,7 -3,1 -7,-3 -2,-3"/>
  </g>
  <g transform="translate(210, 128)" fill="#2F7D5B" opacity="0.5">
    <polygon points="0,-6 1.5,-2 5,-2 2.5,1 3.5,5 0,2.5 -3.5,5 -2.5,1 -5,-2 -1.5,-2"/>
  </g>

  <!-- Axis tick labels (ghost) -->
  <rect x="84" y="205" width="20" height="5" rx="2.5" fill="#E8E5DE"/>
  <rect x="120" y="205" width="20" height="5" rx="2.5" fill="#E8E5DE"/>
  <rect x="156" y="205" width="20" height="5" rx="2.5" fill="#E8E5DE"/>
  <rect x="56" y="152" width="10" height="5" rx="2.5" fill="#E8E5DE"/>
  <rect x="56" y="120" width="10" height="5" rx="2.5" fill="#E8E5DE"/>
</svg>
