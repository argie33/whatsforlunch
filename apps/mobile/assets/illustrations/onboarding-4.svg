<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <!-- Warm background -->
  <circle cx="140" cy="140" r="110" fill="#E8F2EC" opacity="0.5"/>

  <!-- Camera permission card -->
  <rect x="44" y="80" width="88" height="100" rx="16" fill="#FFFFFF" stroke="#E8E5DE" stroke-width="1.5"/>
  <!-- Card header -->
  <rect x="44" y="80" width="88" height="40" rx="16" fill="#2F7D5B"/>
  <rect x="44" y="104" width="88" height="16" fill="#2F7D5B"/>

  <!-- Camera icon in card -->
  <g transform="translate(80,88)" stroke="#FFFFFF" stroke-width="2" fill="none">
    <rect x="-14" y="-8" width="28" height="22" rx="4"/>
    <circle cx="0" cy="3" r="6"/>
    <path d="M-5 -8 L-3 -13 L3 -13 L5 -8" stroke-linecap="round"/>
  </g>

  <!-- Camera card body -->
  <rect x="56" y="132" width="64" height="6" rx="3" fill="#0F1411" opacity="0.7"/>
  <rect x="60" y="142" width="56" height="4" rx="2" fill="#5C615E" opacity="0.6"/>
  <rect x="60" y="150" width="48" height="4" rx="2" fill="#5C615E" opacity="0.4"/>

  <!-- Allow button -->
  <rect x="56" y="162" width="64" height="26" rx="8" fill="#2F7D5B"/>
  <rect x="70" y="170" width="36" height="5" rx="2.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Notification permission card -->
  <rect x="148" y="80" width="88" height="100" rx="16" fill="#FFFFFF" stroke="#E8E5DE" stroke-width="1.5"/>
  <!-- Card header -->
  <rect x="148" y="80" width="88" height="40" rx="16" fill="#C98A2B"/>
  <rect x="148" y="104" width="88" height="16" fill="#C98A2B"/>

  <!-- Bell icon in card -->
  <g transform="translate(192,92)" stroke="#FFFFFF" stroke-width="2" fill="none">
    <path d="M0 -10 Q-10 -8 -10 2 L-10 8 L10 8 L10 2 Q10 -8 0 -10Z"/>
    <line x1="0" y1="-12" x2="0" y2="-10"/>
    <path d="M-4 8 Q-4 12 0 12 Q4 12 4 8" fill="none"/>
  </g>

  <!-- Notification card body -->
  <rect x="160" y="132" width="64" height="6" rx="3" fill="#0F1411" opacity="0.7"/>
  <rect x="164" y="142" width="56" height="4" rx="2" fill="#5C615E" opacity="0.6"/>
  <rect x="164" y="150" width="48" height="4" rx="2" fill="#5C615E" opacity="0.4"/>

  <!-- Allow button -->
  <rect x="160" y="162" width="64" height="26" rx="8" fill="#C98A2B"/>
  <rect x="174" y="170" width="36" height="5" rx="2.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Checkmark shield: privacy reassurance at bottom -->
  <rect x="100" y="200" width="80" height="32" rx="12" fill="#E8F2EC"/>
  <g transform="translate(120,216)" stroke="#2F7D5B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 -8 Q-8 -6 -8 0 Q-8 6 0 8 Q8 6 8 0 Q8 -6 0 -8Z"/>
    <polyline points="-3,0 -1,3 4,-2"/>
  </g>
  <rect x="132" y="210" width="40" height="5" rx="2.5" fill="#2F7D5B" opacity="0.8"/>
  <rect x="134" y="219" width="36" height="4" rx="2" fill="#2F7D5B" opacity="0.5"/>
</svg>
