name: Feature
description: A feature from docs/07_FEATURES.md or a new proposal
title: 'F-XXX: <feature name>'
labels: [feature]
body:
  - type: dropdown
    id: track
    attributes:
      label: Worker track
      description: Which worker owns this? (See docs/15_WORKER_TRACKS.md)
      options:
        - W1 — Infrastructure / IaC
        - W2 — Backend / Data
        - W3 — Auth & Security
        - W4 — AI
        - W5 — Mobile Foundation
        - W6 — Mobile Core
        - W7 — Mobile Settings
        - W8 — Mobile Sync
        - W9 — Ops / QA
        - W10 — Design / Polish / Web
        - Cross-cutting (multiple)
    validations:
      required: true
  - type: dropdown
    id: wave
    attributes:
      label: Wave
      options: ['1 (MVP)', '2', '3', '4', '5', '6', 'Hardware']
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the feature?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checkbox list. Copy from docs/07_FEATURES.md if applicable.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: depends-on
    attributes:
      label: Depends on
      description: Issue numbers that must complete first.
  - type: textarea
    id: notes
    attributes:
      label: Notes / context
