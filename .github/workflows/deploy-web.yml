name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & deploy to S3/CloudFront
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @wfl/web build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_PROD }}
          aws-region: us-east-1

      - name: Sync static assets (long-cache)
        run: |
          aws s3 sync apps/web/dist s3://${{ secrets.WEB_S3_BUCKET }} \
            --delete \
            --cache-control 'max-age=31536000,public,immutable' \
            --exclude '*.html' \
            --exclude '.well-known/*'

      - name: Sync HTML (short-cache)
        run: |
          aws s3 sync apps/web/dist s3://${{ secrets.WEB_S3_BUCKET }} \
            --cache-control 'max-age=300,public' \
            --exclude '*' \
            --include '*.html'

      - name: Sync .well-known files (JSON content-type, 1h cache)
        run: |
          aws s3 sync apps/web/dist/.well-known s3://${{ secrets.WEB_S3_BUCKET }}/.well-known \
            --content-type 'application/json' \
            --cache-control 'max-age=3600,public'

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.WEB_CF_DIST_ID }} \
            --paths '/*'
