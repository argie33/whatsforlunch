name: Mobile Submit

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to submit
        required: true
        default: all
        type: choice
        options: [all, ios, android]
      build_id:
        description: 'EAS build ID to submit (leave blank to use --latest)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  submit-ios:
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    name: Submit iOS to App Store
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Submit iOS
        working-directory: apps/mobile
        run: |
          if [ -n "${{ inputs.build_id }}" ]; then
            eas submit --platform ios --profile production --id "${{ inputs.build_id }}" --non-interactive
          else
            eas submit --platform ios --profile production --latest --non-interactive
          fi
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}

      - name: Create Sentry release (iOS)
        if: success()
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_MOBILE }}
        with:
          environment: production

  submit-android:
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' }}
    name: Submit Android to Play Store
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Write service account key
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > apps/mobile/google-service-account.json

      - name: Submit Android
        working-directory: apps/mobile
        run: |
          if [ -n "${{ inputs.build_id }}" ]; then
            eas submit --platform android --profile production --id "${{ inputs.build_id }}" --non-interactive
          else
            eas submit --platform android --profile production --latest --non-interactive
          fi

      - name: Cleanup service account key
        if: always()
        run: rm -f apps/mobile/google-service-account.json

      - name: Create Sentry release (Android)
        if: success()
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_MOBILE }}
        with:
          environment: production
