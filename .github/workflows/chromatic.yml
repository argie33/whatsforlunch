name: Visual Regression (Chromatic)

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'apps/mobile/src/components/**'
      - 'apps/mobile/src/theme/**'
      - 'apps/mobile/.storybook/**'
      - '.github/workflows/chromatic.yml'

permissions:
  contents: read

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual regression baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Chromatic requires full git history for baselines

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm --filter @wfl/mobile build-storybook
        continue-on-error: true

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/mobile
          storybookBuildDir: storybook-static
          # On main: auto-accept as new baseline. On PRs: compare against baseline.
          autoAcceptChanges: ${{ github.ref == 'refs/heads/main' }}
          exitZeroOnChanges: false
          exitOnceUploaded: false
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
