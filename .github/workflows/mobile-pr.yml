name: Mobile PR

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - '.github/workflows/mobile-pr.yml'

permissions:
  contents: read

jobs:
  lint-mobile:
    name: Lint Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wfl/mobile lint || echo "Mobile linting not configured yet"

  build-android-debug:
    name: Build Android Debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup EAS
        run: npm install -g eas-cli
      - name: Build status
        run: echo "Android debug build placeholder for Phase B"
