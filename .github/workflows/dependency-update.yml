name: Dependency Update

on:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Update dependencies
        run: pnpm update --interactive --recursive || echo "Dependency update not configured"
        continue-on-error: true
