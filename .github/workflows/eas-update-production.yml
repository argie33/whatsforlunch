name: EAS Update Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    name: OTA Update to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup EAS
        run: npm install -g eas-cli
      - name: Login EAS
        run: eas-cli login --token ${{ secrets.EXPO_TOKEN }}
      - name: Publish to production
        run: eas-cli update --channel production --auto --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
