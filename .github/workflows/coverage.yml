name: Coverage

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-shared:
    name: Coverage — packages/shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm --filter @wfl/shared test -- --coverage --coverageReporters=lcov,text
        continue-on-error: true
      - name: Upload shared coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: shared
          files: packages/shared/coverage/lcov.info
          fail_ci_if_error: false

  coverage-lambda-services:
    name: Coverage — Lambda services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Test notify-expiring
        run: pnpm --filter @wfl/notify-expiring test
        continue-on-error: true
      - name: Test delete-account
        run: pnpm --filter @wfl/delete-account test
        continue-on-error: true
      - name: Test export-data
        run: pnpm --filter @wfl/export-data test
        continue-on-error: true
      - name: Test food-rules-publish
        run: pnpm --filter @wfl/food-rules-publish test
        continue-on-error: true
      - name: Test revenuecat-webhook
        run: pnpm --filter @wfl/revenuecat-webhook test
        continue-on-error: true

  coverage-mobile:
    name: Coverage — apps/mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm --filter @wfl/mobile test -- --coverage --coverageReporters=lcov,text --ci
        continue-on-error: true
      - name: Upload mobile coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: mobile
          files: apps/mobile/coverage/lcov.info
          fail_ci_if_error: false

  coverage-comment:
    name: PR coverage comment
    needs: [coverage-shared, coverage-lambda-services, coverage-mobile]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Post Codecov summary
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          comment: true
