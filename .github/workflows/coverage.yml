name: Coverage

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-shared:
    name: Coverage — packages/shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm --filter @wfl/shared test -- --coverage --coverageReporters=lcov,text
      - name: Upload shared coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: shared
          files: packages/shared/coverage/lcov.info
          fail_ci_if_error: false

  coverage-services:
    name: Coverage — services/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm --filter "@wfl/service-*" test -- --coverage --coverageReporters=lcov,text
        continue-on-error: true
      - name: Upload services coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: services
          directory: services/
          fail_ci_if_error: false

  coverage-mobile:
    name: Coverage — apps/mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm --filter @wfl/mobile test -- --coverage --coverageReporters=lcov,text
        continue-on-error: true
      - name: Upload mobile coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: mobile
          files: apps/mobile/coverage/lcov.info
          fail_ci_if_error: false

  coverage-comment:
    name: PR coverage comment
    needs: [coverage-shared, coverage-services, coverage-mobile]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Post Codecov summary
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          comment: true
