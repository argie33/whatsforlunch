name: Web PR

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-pr.yml'

permissions:
  contents: read

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wfl/web build || echo "Web app not built yet"
