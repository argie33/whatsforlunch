name: Mobile Build

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup EAS
        run: npm install -g eas-cli
      - name: Login EAS
        run: eas-cli login --token ${{ secrets.EXPO_TOKEN }}
      - name: Build iOS
        run: eas-cli build --platform ios --non-interactive
        continue-on-error: true

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup EAS
        run: npm install -g eas-cli
      - name: Login EAS
        run: eas-cli login --token ${{ secrets.EXPO_TOKEN }}
      - name: Build Android
        run: eas-cli build --platform android --non-interactive
        continue-on-error: true
