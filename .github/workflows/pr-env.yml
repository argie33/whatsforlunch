name: PR Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: pr-env-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR-${{ github.event.number }} environment
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.cdk-outputs.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN_DEV }}
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: CDK synth PR env
        run: pnpm cdk:synth --context env=pr-${{ github.event.number }}
        working-directory: infra/cdk
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Deploy PR environment
        id: cdk-deploy
        run: |
          pnpm cdk:deploy \
            --context env=pr-${{ github.event.number }} \
            --require-approval never \
            --outputs-file /tmp/cdk-outputs-pr-${{ github.event.number }}.json
        working-directory: infra/cdk
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Parse CDK outputs
        id: cdk-outputs
        run: |
          API_URL=$(jq -r '.. | .AppSyncUrl? // empty' /tmp/cdk-outputs-pr-${{ github.event.number }}.json | head -1)
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const apiUrl = '${{ steps.cdk-outputs.outputs.api_url }}';
            const prNum = context.issue.number;
            const status = '${{ steps.cdk-deploy.outcome }}' === 'success' ? '✅' : '⚠️';

            const body = [
              `${status} **Preview environment PR-${prNum}**`,
              '',
              `| Resource | URL |`,
              `|---|---|`,
              `| API | \`${apiUrl || 'deploying...'}\` |`,
              `| Env | \`pr-${prNum}\` |`,
              '',
              `_Updated: ${new Date().toISOString()}_`,
            ].join('\n');

            // Update existing comment if it exists
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Preview environment PR-')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }
