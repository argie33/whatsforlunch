---
# Test: Offline Scanning & Sync
name: Offline Scanning & Sync
tags:
  - offline
  - sync
  - critical

flows:
  - name: Offline Scanning and Sync Test
    commands:
      # Enable offline mode (disable network)
      - runFlow: disable-network

      # Navigate to scan
      - tapOn:
          id: scan_tab

      # Scan barcode while offline
      - tapOn:
          text: Barcode
      - runFlow: simulate-barcode-detection

      # Should still work (uses cache)
      - assertVisible:
          text: Coca-Cola

      # Save item
      - tapOn:
          text: Save

      # Verify item saved locally
      - assertVisible:
          text: Queued for sync

      # Re-enable network
      - runFlow: enable-network

      # Wait for sync
      - wait:
          ms: 3000

      # Verify synced
      - assertVisible:
          text: Synced

---
name: Disable Network
appId: com.whatsforlunch.mobile

commands:
  - openLink: prefs://network/offline
  - wait:
      ms: 500

---
name: Enable Network
appId: com.whatsforlunch.mobile

commands:
  - openLink: prefs://network/online
  - wait:
      ms: 1000

---
# Test: Error Handling
name: Error Handling & Retry
tags:
  - error-handling
  - retry
  - resilience

flows:
  - name: Network Error & Auto-Retry
    commands:
      # Navigate to items
      - tapOn:
          id: items_tab

      # Simulate network error
      - runFlow: simulate-network-error

      # Try to perform action that requires network
      - tapOn:
          text: Add Item
      - tapOn:
          text: Barcode
      - runFlow: simulate-barcode-detection

      # Should show error and retry option
      - assertVisible:
          text: Network error

      # Tap retry
      - tapOn:
          text: Retry

      # Should eventually succeed
      - wait:
          ms: 5000
      - assertVisible:
          text: Coca-Cola

---
# Test: Search & Filtering
name: Search & Filtering
tags:
  - search
  - filtering
  - dashboard

flows:
  - name: Search and Filter Items
    commands:
      # Navigate to items
      - tapOn:
          id: items_tab

      # Search for item
      - tapOn:
          id: search_input
      - typeText: pasta
      - wait:
          ms: 1000

      # Verify filtered results
      - assertVisible:
          text: Pasta with marinara
      - assertNotVisible:
          text: Coca-Cola

      # Clear search
      - tapOn:
          id: clear_search

      # Filter by category
      - tapOn:
          text: Filter
      - tapOn:
          text: Protein
      - wait:
          ms: 1000

      # Verify category filtered
      - assertVisible:
          text: Roasted chicken

---
# Test: Household Sharing
name: Household Member Invitation
tags:
  - household
  - sharing
  - multi-user

flows:
  - name: Invite Household Member
    commands:
      # Navigate to settings
      - tapOn:
          id: settings_tab

      # Open household members
      - tapOn:
          text: Household Members
      - assertVisible:
          text: Invite New Member

      # Invite member
      - tapOn:
          id: invite_email_input
      - typeText: alice@example.com
      - tapOn:
          text: Member
      - tapOn:
          text: Send Invite

      # Verify success
      - assertVisible:
          text: Invitation sent

      # Verify member appears in list
      - assertVisible:
          text: alice@example.com

