appId: com.whatsforlunch.mobile
---
# E2E Test: Complete QR Scanning Flow
# Tests: QR detection → Container claiming → Item display

name: QR Scanning Flow
tags:
  - scanning
  - critical
  - qr

flows:
  - name: Complete QR Scanning Test
    commands:
      # Start at dashboard
      - tapOn:
          id: scan_tab
      - assertVisible:
          text: Scan Food

      # Open camera
      - tapOn:
          text: QR Code
      - assertVisible:
          text: Point camera at QR code

      # Wait for camera to initialize
      - wait:
          ms: 2000

      # Simulate QR code detection (in real test: show QR code to camera)
      - runFlow: simulate-qr-detection

      # Wait for container to be claimed
      - wait:
          ms: 3000

      # Verify success
      - assertVisible:
          text: Container claimed

      # Navigate to containers
      - tapOn:
          id: containers_tab
      - assertVisible:
          text: Containers

      # Verify container appears in list
      - assertVisible:
          text: Blue Tupperware

---
name: Simulate QR Detection
appId: com.whatsforlunch.mobile

commands:
  # This would normally be triggered by actual QR code detection
  # For testing, we simulate by navigating directly to success state
  - tapOn:
      id: skip_camera_button
  - typeText: qr_token_12345
  - tapOn:
      text: Claim Container
  - wait:
      ms: 1000
  - assertVisible:
      text: Successfully claimed

---
# Test: Barcode Scanning Flow
name: Barcode Scanning Flow
tags:
  - scanning
  - barcode
  - product-lookup

flows:
  - name: Complete Barcode Scanning Test
    commands:
      # Navigate to scan
      - tapOn:
          id: scan_tab
      - assertVisible:
          text: Scan Food

      # Select barcode mode
      - tapOn:
          text: Barcode
      - assertVisible:
          text: Point camera at barcode

      # Simulate barcode detection
      - runFlow: simulate-barcode-detection

      # Wait for product lookup
      - wait:
          ms: 3000

      # Verify product data loaded
      - assertVisible:
          text: Coca-Cola
      - assertVisible:
          text: 330ml

      # Edit form
      - tapOn:
          id: expiry_input
      - typeText: 7
      - tapOn:
          text: days

      # Save item
      - tapOn:
          text: Save

      # Verify item created
      - assertVisible:
          text: Coca-Cola
      - assertVisible:
          id: items_list

