---
# Performance Test
name: Performance & Latency
tags:
  - performance
  - latency
  - metrics

flows:
  - name: Measure Scanning Latency
    commands:
      # Start measurement
      - runFlow: measure-qr-detection-time

      # Navigate to scan
      - tapOn:
          id: scan_tab
      - tapOn:
          text: QR Code

      # Simulate QR detection
      - runFlow: simulate-qr-detection

      # Measure time to success
      - wait:
          ms: 3000
      - assertVisible:
          text: Container claimed

      # Log performance metrics
      - runFlow: log-performance-metrics

